<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Entrenador Formulario</title>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-chalkboard-user"></i> <span th:text="${entrenador.id} != null ? 'Editar Entrenador' : 'Nuevo Entrenador'"></span></h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/entrenador/guardar}" th:object="${entrenador}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-3">
                                <label class="form-label">Nombre:</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Apellido:</label>
                                <input type="text" class="form-control" th:field="*{apellido}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Edad:</label>
                                <input type="number" class="form-control" th:field="*{edad}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Nacionalidad:</label>
                                <input type="text" class="form-control" th:field="*{nacionalidad}" required>
                            </div>
                            
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Guardar
                                </button>
                                <a th:href="@{/entrenador/listar}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
