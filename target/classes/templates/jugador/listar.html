<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Jugadores</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3><i class="fas fa-users"></i> Lista de Jugadores</h3>
                <a th:href="@{/jugador/nuevo}" class="btn btn-light">
                    <i class="fas fa-plus"></i> Nuevo Jugador
                </a>
            </div>
            <div class="card-body">
                <div th:if="${jugadores.isEmpty()}" class="alert alert-info text-center">
                    <i class="fas fa-info-circle"></i> No hay jugadores registrados.
                </div>
                <div th:unless="${jugadores.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre Completo</th>
                                    <th>N° Camiseta</th>
                                    <th>Posición</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="jug : ${jugadores}">
                                    <td th:text="${jug.id}">1</td>
                                    <td th:text="${jug.nombre + ' ' + jug.apellido}">Lionel Messi</td>
                                    <td>
                                        <span class="badge bg-primary rounded-pill" th:text="${jug.numero}">10</span>
                                    </td>
                                    <td>
                                        <span class="badge bg-success" th:text="${jug.posicion}">Delantero</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/jugador/editar/{id}(id=${jug.id})}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-edit"></i> Editar
                                        </a>
                                        <form th:action="@{/jugador/eliminar/{id}(id=${jug.id})}" method="post" style="display:inline"
                                              onsubmit="return confirm('¿Eliminar jugador?')">
                                            <button type="submit" class="btn btn-danger btn-sm">
                                                <i class="fas fa-trash"></i> Eliminar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
