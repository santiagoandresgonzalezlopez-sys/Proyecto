<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clubes</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3><i class="fas fa-shield-alt"></i> Lista de Clubes</h3>
                <a th:href="@{/club/nuevo}" class="btn btn-light">
                    <i class="fas fa-plus"></i> Nuevo Club
                </a>
            </div>
            <div class="card-body">
                <div th:if="${clubes.isEmpty()}" class="alert alert-info text-center">
                    <i class="fas fa-info-circle"></i> No hay clubes registrados.
                </div>
                <div th:unless="${clubes.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Ciudad</th>
                                    <th>Año Fundación</th>
                                    <th>Entrenador</th>
                                    <th>Asociación</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="club : ${clubes}">
                                    <td th:text="${club.id}">1</td>
                                    <td th:text="${club.nombre}">Club Ejemplo</td>
                                    <td th:text="${club.ciudad}">Ciudad</td>
                                    <td th:text="${club.anoFundacion}">2020</td>
                                    <td th:text="${club.entrenador != null ? club.entrenador.nombre + ' ' + club.entrenador.apellido : 'Sin asignar'}">-</td>
                                    <td th:text="${club.asociacion != null ? club.asociacion.nombre : 'Sin asociación'}">-</td>
                                    <td>
                                        <a th:href="@{/club/editar/{id}(id=${club.id})}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-edit"></i> Editar
                                        </a>
                                        <form th:action="@{/club/eliminar/{id}(id=${club.id})}" method="post" style="display:inline"
                                              onsubmit="return confirm('¿Eliminar este club?')">
                                            <button type="submit" class="btn btn-danger btn-sm">
                                                <i class="fas fa-trash"></i> Eliminar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
