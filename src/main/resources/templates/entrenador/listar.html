<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Entrenadores</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3><i class="fas fa-chalkboard-user"></i> Lista de Entrenadores</h3>
                <a th:href="@{/entrenador/nuevo}" class="btn btn-light">
                    <i class="fas fa-plus"></i> Nuevo Entrenador
                </a>
            </div>
            <div class="card-body">
                <div th:if="${entrenadores.isEmpty()}" class="alert alert-info text-center">
                    <i class="fas fa-info-circle"></i> No hay entrenadores registrados.
                </div>
                <div th:unless="${entrenadores.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Edad</th><th>Nacionalidad</th><th>Acciones</th></tr>
                            </thead>
                            <tbody>
                                <tr th:each="ent : ${entrenadores}">
                                    <td th:text="${ent.id}">1</td>
                                    <td th:text="${ent.nombre}">Juan</td>
                                    <td th:text="${ent.apellido}">Pérez</td>
                                    <td th:text="${ent.edad}">45</td>
                                    <td th:text="${ent.nacionalidad}">Argentina</td>
                                    <td>
                                        <a th:href="@{/entrenador/editar/{id}(id=${ent.id})}" class="btn btn-warning btn-sm">✏️ Editar</a>
                                        <form th:action="@{/entrenador/eliminar/{id}(id=${ent.id})}" method="post" style="display:inline"
                                              onsubmit="return confirm('¿Eliminar?')">
                                            <button type="submit" class="btn btn-danger btn-sm">🗑️ Eliminar</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
